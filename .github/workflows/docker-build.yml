name: Build and Push Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/onlytogether

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: room-service
            dockerfile: services/room-service/Dockerfile
          - name: chat-service
            dockerfile: services/chat-service/Dockerfile
          - name: realtime-service
            dockerfile: services/realtime-service/Dockerfile
          - name: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - name: frontend
            dockerfile: frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker tags
        id: vars
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ steps.vars.outputs.short_sha }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:build-${{ github.run_number }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:latest