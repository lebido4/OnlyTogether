name: Deploy Fixed Docker Images

on:
  workflow_run:
    workflows:
      - Build Docker Images
    types:
      - completed
    branches:
      - develop
      - main

permissions:
  contents: read
  packages: read

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/watchparty

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    environment: ${{ github.event.workflow_run.head_branch }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release tag
        run: |
          echo "DEPLOY_ENV=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Prepare release image tags
        run: |
          echo "AUTH_SERVICE_IMAGE=${IMAGE_PREFIX}-auth-service:${SHORT_SHA}" >> $GITHUB_ENV
          echo "ROOM_SERVICE_IMAGE=${IMAGE_PREFIX}-room-service:${SHORT_SHA}" >> $GITHUB_ENV
          echo "CHAT_SERVICE_IMAGE=${IMAGE_PREFIX}-chat-service:${SHORT_SHA}" >> $GITHUB_ENV
          echo "REALTIME_SERVICE_IMAGE=${IMAGE_PREFIX}-realtime-service:${SHORT_SHA}" >> $GITHUB_ENV
          echo "API_GATEWAY_IMAGE=${IMAGE_PREFIX}-api-gateway:${SHORT_SHA}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${IMAGE_PREFIX}-frontend:${SHORT_SHA}" >> $GITHUB_ENV

      - name: Apply environment config
        run: |
          cat > .env.deploy <<EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
          FRONTEND_URL=${{ vars.FRONTEND_URL }}
          VITE_PUBLIC_ORIGIN=${{ vars.VITE_PUBLIC_ORIGIN }}
          VITE_API_URL=${{ vars.VITE_API_URL }}
          VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL }}

          AUTH_SERVICE_IMAGE=${AUTH_SERVICE_IMAGE}
          ROOM_SERVICE_IMAGE=${ROOM_SERVICE_IMAGE}
          CHAT_SERVICE_IMAGE=${CHAT_SERVICE_IMAGE}
          REALTIME_SERVICE_IMAGE=${REALTIME_SERVICE_IMAGE}
          API_GATEWAY_IMAGE=${API_GATEWAY_IMAGE}
          FRONTEND_IMAGE=${FRONTEND_IMAGE}
          EOF

      - name: Log release identity
        run: |
          echo "Release environment: ${DEPLOY_ENV}"
          echo "Release image tag: ${SHORT_SHA}"
          echo "Auth image: ${AUTH_SERVICE_IMAGE}"
          echo "Chat image: ${CHAT_SERVICE_IMAGE}"

      - name: Deploy without rebuild
        run: |
          docker compose --env-file .env.deploy -f docker-compose.deploy.yml pull
          docker compose --env-file .env.deploy -f docker-compose.deploy.yml up -d --no-build