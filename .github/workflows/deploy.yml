name: Deploy Fixed Docker Images

on:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  packages: write  # Добавить write для загрузки образов

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/watchparty
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Select deploy environment
        run: |
          echo "DEPLOY_ENV=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push images
        run: |
          docker build -f services/auth-service/Dockerfile -t ghcr.io/${{ github.repository_owner }}/watchparty-auth-service:${GITHUB_SHA::7} .
          docker build -f services/room-service/Dockerfile -t ghcr.io/${{ github.repository_owner }}/watchparty-room-service:${GITHUB_SHA::7} .
          docker build -f services/chat-service/Dockerfile -t ghcr.io/${{ github.repository_owner }}/watchparty-chat-service:${GITHUB_SHA::7} .
          docker build -f services/realtime-service/Dockerfile -t ghcr.io/${{ github.repository_owner }}/watchparty-realtime-service:${GITHUB_SHA::7} .
          docker build -f services/api-gateway/Dockerfile -t ghcr.io/${{ github.repository_owner }}/watchparty-api-gateway:${GITHUB_SHA::7} .
          docker build -f frontend/Dockerfile -t ghcr.io/${{ github.repository_owner }}/watchparty-frontend:${GITHUB_SHA::7} .
          
          docker push ghcr.io/${{ github.repository_owner }}/watchparty-auth-service:${GITHUB_SHA::7}
          docker push ghcr.io/${{ github.repository_owner }}/watchparty-room-service:${GITHUB_SHA::7}
          docker push ghcr.io/${{ github.repository_owner }}/watchparty-chat-service:${GITHUB_SHA::7}
          docker push ghcr.io/${{ github.repository_owner }}/watchparty-realtime-service:${GITHUB_SHA::7}
          docker push ghcr.io/${{ github.repository_owner }}/watchparty-api-gateway:${GITHUB_SHA::7}
          docker push ghcr.io/${{ github.repository_owner }}/watchparty-frontend:${GITHUB_SHA::7}

      - name: Prepare release image tags
        run: |
          echo "AUTH_SERVICE_IMAGE=ghcr.io/${{ github.repository_owner }}/watchparty-auth-service:${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "ROOM_SERVICE_IMAGE=ghcr.io/${{ github.repository_owner }}/watchparty-room-service:${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "CHAT_SERVICE_IMAGE=ghcr.io/${{ github.repository_owner }}/watchparty-chat-service:${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "REALTIME_SERVICE_IMAGE=ghcr.io/${{ github.repository_owner }}/watchparty-realtime-service:${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "API_GATEWAY_IMAGE=ghcr.io/${{ github.repository_owner }}/watchparty-api-gateway:${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${{ github.repository_owner }}/watchparty-frontend:${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Apply environment config
        run: |
          cat > .env.deploy <<EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
          FRONTEND_URL=${{ vars.FRONTEND_URL }}
          VITE_PUBLIC_ORIGIN=${{ vars.VITE_PUBLIC_ORIGIN }}
          VITE_API_URL=${{ vars.VITE_API_URL }}
          VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL }}
          
          AUTH_SERVICE_IMAGE=${AUTH_SERVICE_IMAGE}
          ROOM_SERVICE_IMAGE=${ROOM_SERVICE_IMAGE}
          CHAT_SERVICE_IMAGE=${CHAT_SERVICE_IMAGE}
          REALTIME_SERVICE_IMAGE=${REALTIME_SERVICE_IMAGE}
          API_GATEWAY_IMAGE=${API_GATEWAY_IMAGE}
          FRONTEND_IMAGE=${FRONTEND_IMAGE}
          EOF

      - name: Deploy with pulled images
        run: |
          docker compose \
            --env-file .env.deploy \
            -f docker-compose.deploy.yml \
            pull
          
          docker compose \
            --env-file .env.deploy \
            -f docker-compose.deploy.yml \
            up -d --no-build