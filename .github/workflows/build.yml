name: Build Docker Images

on:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/onlytogether

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: room-service
            dockerfile: services/room-service/Dockerfile
          - name: chat-service
            dockerfile: services/chat-service/Dockerfile
          - name: realtime-service
            dockerfile: services/realtime-service/Dockerfile
          - name: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - name: frontend
            dockerfile: frontend/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ env.SHORT_SHA }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:latest